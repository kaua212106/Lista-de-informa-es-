<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista de informações</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

/* Botão discreto no canto */
#btnSeguranca {
  position: fixed;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

/* Área de senha escondida */
#areaSenha {
  display: none;
  margin-top: 20px;
}

#mensagem {
  color: red;
  font-size: 14px;
}

input, textarea {
  padding: 8px;
  width: 150px;
}

textarea {
  width: 300px;
  height: 100px;
}

button {
  padding: 8px;
  cursor: pointer;
  margin-left: 5px;
}

li {
  margin: 5px 0;
  padding: 5px;
  border: 1px solid #ccc;
  list-style-type: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Pauzinhos para arrastar */
.drag-handle {
  cursor: move;
  margin-right: 10px;
}
</style>
</head>

<body>

<!-- Botão discreto -->
<button id="btnSeguranca" onclick="mostrarSeguranca()">⚙</button>

<h2>Lista de informações</h2>

<input type="text" id="nome" placeholder="Digite algo">
<button onclick="salvar()">Salvar</button>

<ul id="lista"></ul>

<!-- Área de segurança -->
<div id="areaSenha">
  <h4>Digite a senha correta para conseguir excluir ou reorganizar as anotações</h4>
  <input type="password" id="senha" placeholder="Digite a senha">
  <button type="button" onclick="verificar()">Confirmar</button>
  <button type="button" onclick="mostrarSenha()">mostrar senha</button>
  <p id="mensagem"></p>
  <h4>Exportar anotações</h4>
  <button onclick="exportar()">Exportar lista</button>  
  <h4>Importar lista via arquivo</h4>
  <input type="file" id="importFile" onchange="importarArquivo(event)">
</div>

<!-- SortableJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
let dados = JSON.parse(localStorage.getItem("banco")) || [];
let admin = false;

// Inicializa SortableJS
let listaUl = document.getElementById("lista");
let sortable = new Sortable(listaUl, {
  handle: ".drag-handle",
  animation: 150,
  disabled: true, // só ativa se admin = true
  onEnd: function (evt) {
    let item = dados.splice(evt.oldIndex, 1)[0];
    dados.splice(evt.newIndex, 0, item);
    localStorage.setItem("banco", JSON.stringify(dados));
    mostrar();
  }
});

function salvar() {
  let nome = document.getElementById("nome").value;
  if (nome !== "") {
    dados.push(nome);
    localStorage.setItem("banco", JSON.stringify(dados));
    document.getElementById("nome").value = "";
    mostrar();
  }
}

function mostrar() {
  listaUl.innerHTML = "";

  dados.forEach(function(item, index) {
    let li = document.createElement("li");

    if (admin === true) {
      // Pauzinhos para arrastar
      let handle = document.createElement("span");
      handle.textContent = "☰";
      handle.className = "drag-handle";
      li.appendChild(handle);

      // Texto
      li.appendChild(document.createTextNode(item));

      // Botão excluir
      let botao = document.createElement("button");
      botao.textContent = "Excluir";
      botao.onclick = function() {
        dados.splice(index, 1);
        localStorage.setItem("banco", JSON.stringify(dados));
        mostrar();
      };
      li.appendChild(botao);

    } else {
      li.textContent = item;
    }

    listaUl.appendChild(li);
  });

  sortable.option("disabled", !admin);
}

function mostrarSeguranca() {
  let area = document.getElementById("areaSenha");

  if (area.style.display === "none" || area.style.display === "") {
    area.style.display = "block";
  } else {
    area.style.display = "none";
    admin = false;
    mostrar();
    document.getElementById("senha").value = "";
    document.getElementById("mensagem").textContent = "";
    document.getElementById("importText").value = "";
    document.getElementById("importFile").value = "";
  }
}

function verificar() {
  let senhaDigitada = document.getElementById("senha").value;

  const senhaCorreta = atob("SGVucmlxdWUyMTIxMDZf");

if (senhaDigitada === senhaCorreta) {
    admin = true;
    document.getElementById("mensagem").textContent = "";
    mostrar();
  } else {
    document.getElementById("mensagem").textContent = "Senha incorreta";
  }
}

function mostrarSenha() {
  let campo = document.getElementById("senha");
  if (campo.type === "password") {
    campo.type = "text";
  } else {
    campo.type = "password";
  }
}

// Exportar lista
function exportar() {
  const dataStr = JSON.stringify(dados, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });

  if (window.exportUrl) {
    URL.revokeObjectURL(window.exportUrl);
  }

  window.exportUrl = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = window.exportUrl;
  a.download = "meu_banco.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => {
    URL.revokeObjectURL(window.exportUrl);
  }, 1000);
}

// Importar lista manualmente
function importarManual() {
  let texto = document.getElementById("importText").value;
  try {
    let importDados = JSON.parse(texto);
    if (Array.isArray(importDados)) {
      dados = importDados;
      localStorage.setItem("banco", JSON.stringify(dados));
      mostrar();
      document.getElementById("importText").value = "";
      alert("Importação manual concluída!");
    } else {
      alert("O código inserido não é uma lista válida.");
    }
  } catch (e) {
    alert("Erro ao ler o código. Certifique-se de colar o JSON corretamente.");
  }
}

// Importar lista via arquivo
function importarArquivo(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let importDados = JSON.parse(e.target.result);
      if (Array.isArray(importDados)) {
        dados = importDados;
        localStorage.setItem("banco", JSON.stringify(dados));
        mostrar();
        alert("Importação via arquivo concluída!");
      } else {
        alert("O arquivo selecionado não contém uma lista válida.");
      }
    } catch (err) {
      alert("Erro ao ler o arquivo. Certifique-se de que é JSON válido.");
    }
    document.getElementById("importFile").value = ""; // limpa input
  };
  reader.readAsText(file);
}

mostrar();
</script>

</body>
</html>
